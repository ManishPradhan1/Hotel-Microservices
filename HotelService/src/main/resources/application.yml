server:
  port: 8083

spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/microservice
    username: postgres
    password: 123

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true

  application:
    name: HOTELSERVICE        # ← removed hyphen

eureka:
  client:
    fetch-registry: true
    register-with-eureka: true
    service-url:
      defaultZone: http://localhost:8761/eureka
  instance:
    prefer-ip-address: true
    instance-id: ${spring.application.name}:${server.port}